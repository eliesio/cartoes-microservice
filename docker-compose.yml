services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: cartoes-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16
    container_name: cartoes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cartoesdb
      POSTGRES_USER: cartoes
      POSTGRES_PASSWORD: cartoes
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cartoes -d cartoesdb"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data: